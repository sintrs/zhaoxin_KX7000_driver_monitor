name: 兆芯驱动监控

on:
  schedule:
    - cron: '55 0,3,5,7 * * *'  # 每12小时运行一次（00:00 和 12:00 UTC）
  workflow_dispatch:        # 允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行监控
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python zhaoxin_monitor.py
